name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to release when running manually; must match Cargo.toml exactly
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BINARY_SOURCE: target/release/mercury-cli
  PACKAGE_BINARY: mercury-cli
  PACKAGE_BINARY_ALIAS: mercury

jobs:
  tier1-release-gate:
    name: Tier 1 release gate
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST_VERSION="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path
          manifest = Path("Cargo.toml").read_bytes()
          print(tomllib.loads(manifest.decode("utf-8"))["package"]["version"])
          PY
          )"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "version input is required for manual releases" >&2
            exit 1
          fi

          if [[ "$VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "resolved release version '$VERSION' does not match Cargo.toml package version '$MANIFEST_VERSION'" >&2
            exit 1
          fi

          PRERELEASE=false
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Validate checked-in Tier 1 benchmark gate
        run: python3 scripts/check_tier1_gate.py --current-version "${{ steps.version.outputs.version }}"

  build-and-release:
    name: Build and release (${{ matrix.label }})
    needs: tier1-release-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux-x86_64
            archive_target: x86_64-unknown-linux-gnu
          - os: macos-14
            label: macos-arm64
            archive_target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Render benchmark-tied release notes
        run: |
          python3 scripts/check_tier1_gate.py \
            --current-version "${{ needs.tier1-release-gate.outputs.version }}" \
            --release-notes-out release-notes.md

      - name: Build release binary
        run: cargo build --release --locked --bin mercury-cli

      - name: Package release archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.tier1-release-gate.outputs.version }}"
          PACKAGE_ROOT="mercury-${VERSION}-${{ matrix.archive_target }}"
          ARCHIVE="${PACKAGE_ROOT}.tar.gz"

          mkdir -p "$PACKAGE_ROOT"
          cp "$BINARY_SOURCE" "$PACKAGE_ROOT/$PACKAGE_BINARY"
          cp "$BINARY_SOURCE" "$PACKAGE_ROOT/$PACKAGE_BINARY_ALIAS"
          cp README.md CHANGELOG.md SECURITY.md "$PACKAGE_ROOT/"
          tar -czf "$ARCHIVE" "$PACKAGE_ROOT"

          ARCHIVE_PATH="$ARCHIVE" python3 - <<'PY'
          import hashlib
          import os
          from pathlib import Path
          archive = Path(os.environ["ARCHIVE_PATH"])
          checksum = hashlib.sha256(archive.read_bytes()).hexdigest()
          Path(f"{archive}.sha256").write_text(f"{checksum}  {archive.name}\n", encoding="utf-8")
          PY

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Package benchmark publication bundle
        if: matrix.archive_target == 'x86_64-unknown-linux-gnu'
        id: benchmark_bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.tier1-release-gate.outputs.version }}"
          PACKAGE_ROOT="mercury-benchmarks-${VERSION}"
          ARCHIVE="${PACKAGE_ROOT}.tar.gz"

          mkdir -p "$PACKAGE_ROOT/docs/benchmarks" "$PACKAGE_ROOT/evals/v0"
          cp docs/benchmarks/README.md "$PACKAGE_ROOT/docs/benchmarks/"
          cp docs/benchmarks/rust-v0-repair-benchmark.md "$PACKAGE_ROOT/docs/benchmarks/"
          cp docs/benchmarks/rust-v0-quality.report.json "$PACKAGE_ROOT/docs/benchmarks/"
          cp docs/benchmarks/rust-v0-agent-sweep.report.json "$PACKAGE_ROOT/docs/benchmarks/"
          cp evals/v0/tier0-manifest.json "$PACKAGE_ROOT/evals/v0/"
          cp evals/v0/tier1-manifest.json "$PACKAGE_ROOT/evals/v0/"
          cp evals/v0/tier2-manifest.json "$PACKAGE_ROOT/evals/v0/"
          cp CHANGELOG.md "$PACKAGE_ROOT/"
          tar -czf "$ARCHIVE" "$PACKAGE_ROOT"

          ARCHIVE_PATH="$ARCHIVE" python3 - <<'PY'
          import hashlib
          import os
          from pathlib import Path
          archive = Path(os.environ["ARCHIVE_PATH"])
          checksum = hashlib.sha256(archive.read_bytes()).hexdigest()
          Path(f"{archive}.sha256").write_text(f"{checksum}  {archive.name}\n", encoding="utf-8")
          PY

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mercury-cli-${{ matrix.archive_target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256

      - name: Upload benchmark publication artifact
        if: steps.benchmark_bundle.outputs.archive != ''
        uses: actions/upload-artifact@v4
        with:
          name: mercury-benchmarks
          path: |
            ${{ steps.benchmark_bundle.outputs.archive }}
            ${{ steps.benchmark_bundle.outputs.archive }}.sha256

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.tier1-release-gate.outputs.version }}
          prerelease: ${{ needs.tier1-release-gate.outputs.prerelease == 'true' }}
          body_path: release-notes.md
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256

      - name: Publish benchmark release asset
        if: steps.benchmark_bundle.outputs.archive != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.tier1-release-gate.outputs.version }}
          prerelease: ${{ needs.tier1-release-gate.outputs.prerelease == 'true' }}
          files: |
            ${{ steps.benchmark_bundle.outputs.archive }}
            ${{ steps.benchmark_bundle.outputs.archive }}.sha256
